name: Generar minuta con IA

on:
  workflow_dispatch:
    inputs:
      reunion_id:
        description: "ID de la reunión a procesar (vacío = procesar todas las pendientes)"
        type: string
        default: ""

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests anthropic

      - name: Generar minuta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REUNION_ID: ${{ github.event.inputs.reunion_id }}
        run: python scripts/generar_minuta.py
