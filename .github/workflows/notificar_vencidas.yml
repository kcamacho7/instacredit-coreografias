name: Notificar acciones vencidas

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      forzar_semanal:
        description: "Forzar envío del resumen semanal aunque hoy no sea miércoles"
        type: boolean
        default: false
      correo_prueba:
        description: "Modo prueba: correo destino (deja vacío para envío normal)"
        type: string
        default: ""
      pais_prueba:
        description: "Modo prueba: código de país (CR, NI, PA, SV)"
        type: string
        default: ""

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar notificaciones
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REGIONAL_EMAIL: ${{ secrets.REGIONAL_EMAIL }}
          FORZAR_SEMANAL: ${{ github.event.inputs.forzar_semanal }}
          CORREO_PRUEBA: ${{ github.event.inputs.correo_prueba }}
          PAIS_PRUEBA: ${{ github.event.inputs.pais_prueba }}
        run: python scripts/notificar_vencidas.py
