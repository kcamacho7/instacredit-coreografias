name: Enviar minuta por correo

on:
  workflow_dispatch:
    inputs:
      correo_prueba:
        description: "Modo prueba: envía un ejemplo con datos ficticios a este correo (deja vacío para envío normal)"
        type: string
        default: ""

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests reportlab

      - name: Enviar minutas pendientes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REGIONAL_EMAIL: ${{ secrets.REGIONAL_EMAIL }}
          CORREO_PRUEBA: ${{ github.event.inputs.correo_prueba }}
        run: python scripts/enviar_minuta.py
