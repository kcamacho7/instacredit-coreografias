  block.className = 'area-block proyecto-area';
  block.innerHTML = `
    <div class="area-header">
      <h2>Proyecto especial</h2>
      <span>Seguimiento adicional</span>
    </div>
    <div class="area-owner"><strong>Uso:</strong> espacio libre para documentar el seguimiento de proyectos especiales asignados a este país (fuera del catálogo fijo de KPI).</div>
  `;

  const listWrap = document.createElement('div');
  const proyectos = state[paisCode].proyectosEspeciales;

  function renderList(){
    listWrap.innerHTML = '';
    if(proyectos.length === 0){
      const empty = document.createElement('div');
      empty.className = 'sin-proyectos';
      empty.textContent = 'Sin proyectos especiales registrados.';
      listWrap.appendChild(empty);
    }
    proyectos.forEach((proy, idx)=>{
      const accKey = paisCode + '|proyecto|' + proy.id;
      const isOpen = openAccordions.has(accKey);

      const card = document.createElement('div');
      card.className = 'proyecto-card' + (isUnlocked ? '' : ' locked') + (isOpen ? ' open' : '');

      const headerRow = document.createElement('div');
      headerRow.className = 'proyecto-card-header';
      headerRow.innerHTML = `
        <button type="button" class="proyecto-toggle" title="Mostrar/ocultar detalle">▶</button>
        <input type="text" class="nombre-input" placeholder="Nombre del proyecto especial" value="${escapeAttr(proy.nombre)}">
        <button type="button" class="btn-eliminar-proyecto">Eliminar proyecto</button>
      `;
      headerRow.querySelector('.proyecto-toggle').addEventListener('click', ()=>{
        card.classList.toggle('open');
        if(card.classList.contains('open')){
          openAccordions.add(accKey);
          card.querySelectorAll('textarea').forEach(autoGrow);
        } else {
          openAccordions.delete(accKey);
        }
      });
      headerRow.querySelector('.nombre-input').addEventListener('input', (e)=>{
        proy.nombre = e.target.value;
        markDirty();
      });
      headerRow.querySelector('.btn-eliminar-proyecto').addEventListener('click', async ()=>{
        if(!confirm('¿Eliminar el proyecto especial "' + (proy.nombre || '(sin nombre)') + '"? Quedará registrado en la bitácora de Riesgo Regional con los últimos datos.')) return;
        await sb.from('proyectos_especiales_log').insert([{
          original_id: proy.id,
          pais_code: paisCode,
          nombre: proy.nombre,
          descripcion: proy.descripcion,
          responsable: proy.responsable,
          estado: proy.estado,
          fecha_seguimiento: proy.fechaSeguimiento || null,
          hora_seguimiento: proy.horaSeguimiento || null,
          acciones: proy.acciones
        }]);
        await sb.from('proyectos_especiales').delete().eq('id', proy.id);
        proyectos.splice(idx,1);
        renderList();
        markDirty();
      });
      card.appendChild(headerRow);

      const body = document.createElement('div');
      body.className = 'proyecto-card-body';
      card.appendChild(body);

      const fieldGrid = document.createElement('div');
      fieldGrid.className = 'field-grid';
      fieldGrid.innerHTML = `
        <div class="field">
          <label>Descripción / objetivo</label>
          <textarea data-field="descripcion">${proy.descripcion}</textarea>
        </div>
        <div class="field">
          <label>Responsable</label>
          <input type="text" data-field="responsable" value="${escapeAttr(proy.responsable)}">
        </div>
        <div class="field">
          <label>Estado general</label>
          <select data-field="estado">
            <option value="Pendiente" ${proy.estado==='Pendiente'?'selected':''}>Pendiente</option>
            <option value="En curso" ${proy.estado==='En curso'?'selected':''}>En curso</option>
            <option value="Cumplido" ${proy.estado==='Cumplido'?'selected':''}>Cumplido</option>
            <option value="Detenido" ${proy.estado==='Detenido'?'selected':''}>Detenido</option>
          </select>
        </div>
      `;
      fieldGrid.querySelectorAll('[data-field]').forEach(el=>{
        const ev = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(ev, ()=>{
          proy[el.dataset.field] = el.value;
          markDirty();
        });
      });
      fieldGrid.querySelectorAll('textarea').forEach(wireAutoGrow);
      body.appendChild(fieldGrid);

      const table = document.createElement('table');
      table.className = 'coreo';
      table.innerHTML = `
        <tr><th style="width:5%;">#</th><th style="width:36%;">Acción</th><th style="width:20%;">Responsable</th><th style="width:16%;">Fecha compromiso</th><th style="width:16%;">Estado</th><th class="row-actions">&nbsp;</th></tr>
      `;
      const tbody = document.createElement('tbody');
      table.appendChild(tbody);

      function renderAcciones(){
        tbody.innerHTML = '';
        proy.acciones.forEach((accion, i)=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${i+1}</td>
            <td><textarea data-f="accion" rows="1">${escapeAttr(accion.accion)}</textarea></td>
            <td><textarea data-f="responsable" rows="1">${escapeAttr(accion.responsable)}</textarea></td>
            <td><input type="date" data-f="fecha" min="${HOY}" value="${escapeAttr(accion.fecha)}"></td>
            <td>
              <select data-f="estado" class="estado">
                <option value="Pendiente" ${accion.estado==='Pendiente'?'selected':''}>Pendiente</option>
                <option value="En curso" ${accion.estado==='En curso'?'selected':''}>En curso</option>
                <option value="Cumplida" ${accion.estado==='Cumplida'?'selected':''}>Cumplida</option>
                <option value="Vencida" ${accion.estado==='Vencida'?'selected':''}>Vencida</option>
              </select>
            </td>
            <td class="row-actions">${regionalUnlocked ? '<button type="button" class="btn-regional-check" title="' + (accion.estado==='Cumplida'?'Ya marcada como cumplida':'Marcar cumplida') + '"' + (accion.estado==='Cumplida'?' disabled':'') + '>✓</button>' : ''}<button type="button" class="btn-comentario" title="Ver/agregar resultado">💬</button><button type="button" title="Eliminar fila" data-remove="${i}">×</button></td>
          `;
          if(regionalUnlocked){
            tr.querySelector('.btn-regional-check').addEventListener('click', (e)=>{
              regionalMarcarCumplida('proyectos_especiales', { id: proy.id }, proy.acciones, i, e.target);
            });
          }
          const filaResultado = crearFilaResultado(6, accion, markDirty);
          const refrescarComentario = wireBtnComentario(tr.querySelector('.btn-comentario'), filaResultado, accion);
          tr.querySelectorAll('[data-f]:not([data-f="fecha"])').forEach(el=>{
            const ev = el.tagName === 'SELECT' ? 'change' : 'input';
            el.addEventListener(ev, ()=>{
              accion[el.dataset.f] = el.value;
              markDirty();
              if(el.dataset.f === 'estado') refrescarComentario();
            });
          });
          tr.querySelectorAll('textarea').forEach(wireAutoGrow);
          const fechaAccionInput = tr.querySelector('[data-f="fecha"]');
          wireFechaAccionDefinitiva(fechaAccionInput, accion, markDirty);
          tr.querySelector('[data-remove]').addEventListener('click', ()=>{
            proy.acciones.splice(i,1);
            if(proy.acciones.length===0) proy.acciones.push({accion:'',responsable:'',fecha:'',estado:'Pendiente'});
            renderAcciones();
            markDirty();
          });
          tbody.appendChild(tr);
          tbody.appendChild(filaResultado);
        });
      }
      renderAcciones();
      body.appendChild(table);

      const addRowBtn = document.createElement('button');
      addRowBtn.type = 'button';
      addRowBtn.className = 'add-row-btn';
      addRowBtn.textContent = '+ Agregar acción';
      addRowBtn.addEventListener('click', ()=>{
        proy.acciones.push({accion:'',responsable:'',fecha:'',estado:'Pendiente'});
        renderAcciones();
        markDirty();
      });
      body.appendChild(addRowBtn);

      const fieldGrid2 = document.createElement('div');
      fieldGrid2.className = 'field-grid';
      fieldGrid2.style.paddingTop = '0';
      fieldGrid2.innerHTML = `
        <div class="field">
          <label>Fecha de seguimiento</label>
          <input type="date" data-field="fechaSeguimiento" value="${escapeAttr(proy.fechaSeguimiento)}">
        </div>
        <div class="field">
          <label>Hora sugerida</label>
          <input type="time" data-field="horaSeguimiento" value="${escapeAttr(proy.horaSeguimiento)}">
        </div>
        <div></div>
      `;
      wireFechaHoraDefinitiva(fieldGrid2, proy, 'fechaSeguimiento', 'horaSeguimiento', 'fecha/hora de seguimiento de "' + (proy.nombre || 'este proyecto especial') + '"');
      body.appendChild(fieldGrid2);

      listWrap.appendChild(card);
    });
  }
  renderList();
  block.appendChild(listWrap);

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'add-proyecto-btn';
  addBtn.textContent = '+ Agregar proyecto especial';
  addBtn.disabled = !isUnlocked;
  if(!isUnlocked) addBtn.style.opacity = '.55';
  addBtn.addEventListener('click', ()=>{
    proyectos.push(emptyProyecto());
    renderList();
    markDirty();
  });
  block.appendChild(addBtn);

  return block;
}

const HOY = new Date().toISOString().slice(0,10);

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function wireAutoGrow(textareaEl){
  autoGrow(textareaEl);
  textareaEl.addEventListener('input', ()=> autoGrow(textareaEl));
}

function colocarBadgeJuntoAInput(input, badge){
  const wrapper = document.createElement('span');
  wrapper.style.cssText = 'display:inline-flex;align-items:center;gap:2px;width:100%;';
  input.parentNode.insertBefore(wrapper, input);
  wrapper.appendChild(input);
  wrapper.appendChild(badge);
  input.style.flex = '1';
  input.style.minWidth = '0';
  input.style.width = 'auto';
}

function crearBadgeHistorial(getHistorial){
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'btn-historial-fecha';
  btn.title = 'Ver historial de cambios de esta fecha';
  btn.textContent = '🕓';
  btn.style.display = 'none';
  btn.addEventListener('click', (e)=>{
    e.preventDefault();
    const hist = getHistorial() || [];
    if(!hist.length) return;
    const texto = hist.map((h,idx)=> (idx+1) + '. ' + h.fechaAnterior + (h.horaAnterior ? ' ' + h.horaAnterior : '') + ' → ' + h.fechaNueva + (h.horaNueva ? ' ' + h.horaNueva : '') + ' — ajustada por Riesgo Regional el ' + new Date(h.ajustadaEl).toLocaleString('es-CR')).join('\n');
    alert('Historial de cambios de fecha:\n\n' + texto);
  });
  const refrescar = ()=>{ btn.style.display = (getHistorial() && getHistorial().length) ? 'inline-block' : 'none'; };
  refrescar();
  return { btn, refrescar };
}

function wireFechaAccionDefinitiva(fechaAccionInput, accion, onDirty){
  let comprometida = accion.fecha;
  const aplicarClase = ()=>{
    if(comprometida && !regionalUnlocked) fechaAccionInput.classList.add('fecha-definitiva');
    else fechaAccionInput.classList.remove('fecha-definitiva');
  };
  aplicarClase();
  const { btn: badge, refrescar: refrescarBadge } = crearBadgeHistorial(()=> accion.historialFechas);
  colocarBadgeJuntoAInput(fechaAccionInput, badge);
  fechaAccionInput.addEventListener('change', ()=>{
    if(comprometida && !regionalUnlocked){
      fechaAccionInput.value = comprometida;
      alert('La fecha de compromiso de esta acción ya fue definida (' + comprometida + ') y es definitiva. Si necesitas cambiarla, comunícate con Riesgo Regional para coordinar una nueva fecha.');
      return;
    }
    if(fechaAccionInput.value && fechaAccionInput.value < HOY && !regionalUnlocked){
      fechaAccionInput.value = '';
      alert('La fecha de compromiso debe ser una fecha futura (a partir de hoy).');
      return;
    }
    if(comprometida && regionalUnlocked && fechaAccionInput.value !== comprometida){
      if(!accion.historialFechas) accion.historialFechas = [];
      accion.historialFechas.push({ fechaAnterior: comprometida, fechaNueva: fechaAccionInput.value, ajustadaEl: new Date().toISOString() });
      refrescarBadge();
    }
    comprometida = fechaAccionInput.value;
    accion.fecha = fechaAccionInput.value;
    aplicarClase();
    onDirty();
  });
}

function crearFilaResultado(colspan, accion, onDirty){
  const trDet = document.createElement('tr');
  trDet.className = 'fila-resultado';
  trDet.style.display = 'none';
  trDet.innerHTML = '<td colspan="' + colspan + '"><label>Resultado obtenido</label><textarea rows="2" placeholder="Describe el resultado obtenido con esta acción...">' + escapeAttr(accion.resultado) + '</textarea></td>';
  const ta = trDet.querySelector('textarea');
  ta.addEventListener('input', ()=>{ accion.resultado = ta.value; autoGrow(ta); onDirty(); });
  return trDet;
}

function wireBtnComentario(btn, trDet, accion){
  if(accion.resultado && accion.resultado.trim()) btn.classList.add('tiene-texto');
  btn.addEventListener('click', ()=>{
    const abrir = trDet.style.display === 'none';
    trDet.style.display = abrir ? 'table-row' : 'none';
    if(abrir) autoGrow(trDet.querySelector('textarea'));
  });
  const actualizarDisponibilidad = ()=>{
    const habilitado = accion.estado === 'Cumplida';
    btn.disabled = !habilitado;
    btn.title = habilitado ? 'Ver/agregar resultado' : 'Disponible cuando la acción esté Cumplida';
    if(!habilitado) trDet.style.display = 'none';
  };
  actualizarDisponibilidad();
  return actualizarDisponibilidad;
}

function escapeAttr(v){
  return (v||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

async function regionalMarcarCumplida(tabla, match, acciones, idx, btn){
  if(!confirm('¿Marcar esta acción como cumplida? Riesgo Regional puede hacer esto sin necesitar el PIN del país.')) return;
  acciones[idx].estado = 'Cumplida';
  let q = sb.from(tabla).update({ acciones });
  Object.entries(match).forEach(([k,v])=>{ q = q.eq(k, v); });
  const { error } = await q;
  if(error){
    alert('Error al marcar cumplida: ' + error.message);
    acciones[idx].estado = acciones[idx].estado === 'Cumplida' ? 'Pendiente' : acciones[idx].estado;
    return;
  }
  const row = btn.closest('tr');
  const estadoSelect = row.querySelector('[data-f="estado"]');
  if(estadoSelect) estadoSelect.value = 'Cumplida';
  btn.disabled = true;
  btn.title = 'Ya marcada como cumplida';
  const btnComentario = row.querySelector('.btn-comentario');
  if(btnComentario){
    btnComentario.disabled = false;
    btnComentario.title = 'Ver/agregar resultado';
  }
}

function wireFechaHoraDefinitiva(container, obj, fechaField, horaField, label){
  const fechaInput = container.querySelector('[data-field="' + fechaField + '"]');
  const horaInput = container.querySelector('[data-field="' + horaField + '"]');
  let comprometida = !!obj[fechaField];
  obj['_locked_' + fechaField] = comprometida;
  const aplicarClase = ()=>{
    if(comprometida && !regionalUnlocked){
      fechaInput.classList.add('fecha-definitiva');
      horaInput.classList.add('fecha-definitiva');
    } else {
      fechaInput.classList.remove('fecha-definitiva');
      horaInput.classList.remove('fecha-definitiva');
    }
  };
  aplicarClase();
  const historyKey = '_historial_' + fechaField;
  const { btn: badge, refrescar: refrescarBadge } = crearBadgeHistorial(()=> obj[historyKey]);
  colocarBadgeJuntoAInput(fechaInput, badge);
  const bloquear = ()=>{
    fechaInput.value = obj[fechaField];
    horaInput.value = obj[horaField];
    alert('La ' + label + ' ya fue definida (' + obj[fechaField] + (obj[horaField] ? ' ' + obj[horaField] : '') + ') y es definitiva. Si necesitas cambiarla, comunícate con Riesgo Regional para coordinar una nueva fecha/hora.');
  };
  fechaInput.addEventListener('change', ()=>{
    if(comprometida && !regionalUnlocked){ bloquear(); return; }
    if(comprometida && regionalUnlocked && fechaInput.value !== obj[fechaField]){
      if(!obj[historyKey]) obj[historyKey] = [];
      obj[historyKey].push({ fechaAnterior: obj[fechaField], horaAnterior: obj[horaField], fechaNueva: fechaInput.value, horaNueva: horaInput.value, ajustadaEl: new Date().toISOString() });
      refrescarBadge();
    }
    obj[fechaField] = fechaInput.value;
    comprometida = !!obj[fechaField];
    obj['_locked_' + fechaField] = comprometida;
    aplicarClase();
    markDirty();
  });
  horaInput.addEventListener('change', ()=>{
    if(comprometida && !regionalUnlocked){ bloquear(); return; }
    obj[horaField] = horaInput.value;
    markDirty();
  });
}

document.getElementById('btnSave').addEventListener('click', saveActiveCountry);

async function loadKpiCatalog(){
  const { data, error } = await sb.from('kpis_catalogo').select('*').eq('activo', true).order('area_id').order('orden');
  if(error || !data || data.length === 0) return;
  AREAS.forEach(area=>{
    const kpisDeEstaArea = data.filter(r=> r.area_id === area.id);
    if(kpisDeEstaArea.length){
      area.kpis = kpisDeEstaArea.map(r=> ({ id: r.kpi_id, nombre: r.nombre, def: r.definicion || '' }));
    }
  });
}

(async function init(){
  await checkSesionInicial();
  renderAuthBar();
  await loadKpiCatalog();
  loadLocalCache();
  renderTabs();
  loadFromCloud();
})();
</script>
