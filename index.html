<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coreografías Operativas — Instacredit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
  .pin-bar{background:#FFF6E0;border:1px solid #E8D48A;border-radius:6px;padding:10px 16px;margin:16px 0 0 0;display:flex;align-items:center;gap:10px;font-size:13px;}
  .pin-bar.unlocked{background:var(--verde-claro);border-color:var(--verde);}
  .pin-bar input[type="password"]{font-family:'Inter Tight',sans-serif;border:1px solid var(--gris-borde);border-radius:5px;padding:6px 9px;font-size:13px;width:110px;}
  .pin-bar button{font-family:'Inter Tight',sans-serif;background:var(--azul);color:#fff;border:none;border-radius:5px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .kpi-block.locked textarea, .kpi-block.locked input, .kpi-block.locked select, .kpi-block.locked button.add-row-btn, .kpi-block.locked button[data-remove]{
    pointer-events:none;opacity:.55;background:#F0F0F0 !important;
  }
  .proyecto-area .area-header{background:var(--azul);}
  .proyecto-area .area-owner{background:#1A3A66;}
  .proyecto-card{background:#fff;border:1px solid var(--gris-borde);border-top:none;padding-bottom:6px;}
  .proyecto-card + .proyecto-card{border-top:2px solid var(--gris-borde);}
  .proyecto-card-header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#F0F3F7;border-top:1px solid var(--gris-borde);}
  .proyecto-card-header .nombre-input{
    font-family:'Inter Tight',sans-serif;font-size:14px;font-weight:700;color:var(--azul);
    border:1px solid transparent;border-radius:5px;padding:6px 8px;background:transparent;flex:1;margin-right:12px;
  }
  .proyecto-card-header .nombre-input:focus{outline:none;border-color:var(--azul-claro);background:#fff;}
  .btn-eliminar-proyecto{background:none;border:1px solid var(--rojo);color:var(--rojo);font-family:'Inter Tight',sans-serif;font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:5px;cursor:pointer;}
  .add-proyecto-btn{
    margin:16px 20px 20px 20px;background:var(--azul);color:#fff;border:none;font-family:'Inter Tight',sans-serif;
    font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:6px;cursor:pointer;
  }
  .proyecto-card.locked .nombre-input, .proyecto-card.locked textarea, .proyecto-card.locked input, .proyecto-card.locked select, .proyecto-card.locked button{
    pointer-events:none;opacity:.55;background:#F0F0F0 !important;
  }
  .proyecto-card.locked button.proyecto-toggle{pointer-events:auto !important;opacity:1 !important;background:none !important;}
  .sin-proyectos{padding:20px;font-size:13px;color:var(--azul-claro);font-style:italic;}
  .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:18px 20px;}
  .dashboard-card{background:#fff;border:1px solid var(--gris-borde);border-radius:8px;padding:16px;}
  .dashboard-card.full{grid-column:1 / -1;}
  .dashboard-card h4{margin:0 0 4px 0;color:var(--azul);font-size:13.5px;}
  .dashboard-card .subtitulo{font-size:11.5px;color:var(--azul-claro);margin-bottom:10px;}
  .dashboard-card canvas{max-height:260px;}
  .dashboard-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 20px 18px 20px;}
  .kpi-stat{background:#fff;border:1px solid var(--gris-borde);border-radius:8px;padding:14px;text-align:center;}
  .kpi-stat .valor{font-size:26px;font-weight:800;color:var(--azul);}
  .kpi-stat .etiqueta{font-size:11px;color:var(--azul-claro);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
  .filtro-bar{display:flex;gap:8px;padding:0 20px 18px 20px;flex-wrap:wrap;}
  .filtro-btn{background:#fff;border:1px solid var(--gris-borde);color:var(--azul);font-family:'Inter Tight',sans-serif;font-size:12.5px;font-weight:700;padding:7px 16px;border-radius:20px;cursor:pointer;}
  .filtro-btn:hover{background:#F0F7EE;}
  .filtro-btn.active{background:var(--verde);color:#fff;border-color:var(--verde);}
  input.fecha-definitiva{background:#F0F0F0 !important;color:var(--azul-claro);cursor:not-allowed;border-color:var(--gris-borde) !important;}
  button.btn-regional-check{background:var(--verde);color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px;}
  button.btn-regional-check:disabled{background:var(--gris-borde);color:var(--azul-claro);cursor:default;}
  .kpi-block.locked button.btn-regional-check,
  .proyecto-card.locked button.btn-regional-check{
    pointer-events:auto !important;opacity:1 !important;background:var(--verde) !important;color:#fff !important;
  }
  .kpi-block.locked button.btn-regional-check:disabled,
  .proyecto-card.locked button.btn-regional-check:disabled{
    background:var(--gris-borde) !important;color:var(--azul-claro) !important;
  }
  :root{
    --verde:#4C9C2E;
    --azul:#002554;
    --rojo:#EE212E;
    --verde-claro:#CEF0C4;
    --azul-claro:#677C98;
    --gris-texto:#333333;
    --gris-borde:#D2D2D2;
    --fondo:#F5FCF3;
  }
  *{box-sizing:border-box;}
  body{font-family:'Inter Tight',sans-serif;color:var(--gris-texto);background:var(--fondo);margin:0;padding:0 0 60px 0;}
  .page{max-width:1150px;margin:0 auto;padding:0 32px;}

  header.cover{background:var(--azul);color:#fff;padding:28px 32px 40px 32px;margin-bottom:0;position:relative;overflow:hidden;}
  header.cover .logo-row{margin-bottom:26px;}
  header.cover .logo-row img{height:32px;}
  header.cover .eyebrow{color:var(--verde-claro);font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  header.cover h1{font-size:28px;font-weight:800;margin:0 0 8px 0;line-height:1.15;max-width:640px;}
  header.cover p{color:var(--azul-claro);font-size:14px;margin:0;max-width:640px;}
  header.cover .prestamito{position:absolute;right:26px;bottom:0;height:120px;}

  /* Barra de acciones */
  .toolbar{
    background:#fff;
    border-bottom:1px solid var(--gris-borde);
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 32px;
    flex-wrap:wrap;
  }
  .toolbar .status{font-size:12.5px;color:var(--azul-claro);margin-right:auto;}
  .toolbar .status b{color:var(--verde);}
  .btn{
    display:inline-block;
    font-family:'Inter Tight',sans-serif;
    border:none;
    border-radius:6px;
    padding:9px 16px;
    font-size:13px;
    font-weight:700;
    line-height:1.2;
    cursor:pointer;
  }
  .btn-primary{background:var(--verde);color:#fff;}
  .btn-primary:hover{background:#3f8626;}
  .btn-secondary{background:#fff;color:var(--azul);border:1px solid var(--gris-borde) !important;}
  .btn-secondary:hover{background:#F0F7EE;}

  /* Tabs */
  .tabs{
    display:flex;
    gap:4px;
    background:#fff;
    border-bottom:2px solid var(--gris-borde);
    padding:0 32px;
    position:sticky;
    top:53px;
    z-index:19;
    overflow-x:auto;
  }
  .tab-btn{
    font-family:'Inter Tight',sans-serif;
    background:none;
    border:none;
    padding:14px 20px;
    font-size:14px;
    font-weight:700;
    color:var(--azul-claro);
    cursor:pointer;
    border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  .tab-btn.active{color:var(--azul);border-bottom-color:var(--verde);}
  .tab-btn-regional{margin-left:auto;color:var(--rojo);}
  .tab-btn-regional.active{border-bottom-color:var(--rojo);}
  .tab-panel{display:none;padding-top:28px;}
  .tab-panel.active{display:block;}

  .area-block{margin-bottom:36px;}
  .area-header{background:var(--verde);color:#fff;padding:12px 20px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;}
  .area-header h2{margin:0;font-size:17px;font-weight:800;}
  .area-header span{font-size:11px;font-weight:600;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px;}
  .area-owner{background:var(--azul);color:var(--azul-claro);padding:7px 20px;font-size:12px;}
  .area-owner strong{color:#fff;}

  .kpi-block{background:#fff;border:1px solid var(--gris-borde);border-top:none;}
  .kpi-row-header{background:#F0F7EE;padding:10px 20px;font-weight:700;color:var(--azul);font-size:13px;border-top:1px solid var(--gris-borde);cursor:pointer;display:flex;align-items:center;justify-content:space-between;-webkit-user-select:none;user-select:none;}
  .kpi-row-header:hover{background:#E6F2E1;}
  .kpi-row-header .chevron{display:inline-block;transition:transform .15s;font-size:11px;color:var(--verde);flex:0 0 auto;margin-left:10px;}
  .kpi-accordion-item.open .kpi-row-header .chevron{transform:rotate(90deg);}
  .kpi-accordion-body{display:none;}
  .kpi-accordion-item.open .kpi-accordion-body{display:block;}
  .kpi-row-header .titulo-wrap{display:flex;align-items:center;gap:8px;min-width:0;}
  .badge-tiene-datos{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--verde);}
  .badge-tiene-datos.completada{background:var(--azul);}
  .proyecto-toggle{background:none;border:none;color:var(--azul);cursor:pointer;font-size:12px;padding:2px 4px;transition:transform .15s;flex:0 0 auto;}
  .proyecto-card.open .proyecto-toggle{transform:rotate(90deg);}
  .proyecto-card-body{display:none;}
  .proyecto-card.open .proyecto-card-body{display:block;}
  .kpi-def{padding:4px 20px 10px 20px;font-size:12px;color:var(--azul-claro);border-bottom:1px solid var(--gris-borde);}

  .field-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:14px 20px 6px 20px;}
  .field label{display:block;font-size:10.5px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  .field input[type="text"], .field input[type="date"], .field input[type="time"], .field textarea{
    width:100%;
    font-family:'Inter Tight',sans-serif;
    font-size:13px;
    color:var(--gris-texto);
    border:1px solid var(--gris-borde);
    border-radius:5px;
    padding:7px 9px;
    background:#FAFDF9;
  }
  .field textarea{resize:none;min-height:38px;overflow-y:hidden;}
  img.emoji{height:1em;width:1em;vertical-align:-0.15em;margin:0 .06em;}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--verde);background:#fff;}

  table.coreo{width:calc(100% - 40px);margin:8px 20px 16px 20px;border-collapse:collapse;font-size:12.5px;}
  table.coreo th{background:#fff;color:var(--azul-claro);text-align:left;padding:6px 6px;font-weight:600;border-bottom:1px solid var(--gris-borde);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;}
  table.coreo td{padding:5px 6px;border-bottom:1px dashed var(--gris-borde);}
  table.coreo td input, table.coreo td select, table.coreo td textarea{
    width:100%;
    font-family:'Inter Tight',sans-serif;
    font-size:12.5px;
    border:1px solid transparent;
    border-radius:4px;
    padding:5px 6px;
    background:#FAFDF9;
  }
  table.coreo td textarea{resize:none;overflow-y:hidden;min-height:26px;line-height:1.35;display:block;}
  table.coreo td input:focus, table.coreo td select:focus, table.coreo td textarea:focus{outline:none;border-color:var(--verde);background:#fff;}
  .row-actions{width:34px;text-align:center;}
  .row-actions button{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:15px;font-weight:700;}
  .add-row-btn{
    margin:0 20px 18px 20px;
    background:none;
    border:1px dashed var(--azul-claro);
    color:var(--azul);
    font-family:'Inter Tight',sans-serif;
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
  }
  .add-row-btn:hover{background:#F0F7EE;}

  select.estado{
    background:#fff;
  }

  footer{max-width:1150px;margin:40px auto 0 auto;padding:20px 32px;border-top:1px solid var(--gris-borde);font-size:12px;color:var(--azul-claro);display:flex;justify-content:space-between;}

  @media print{
    .toolbar, .tabs{position:static;}
    .tab-panel{display:block !important;}
  }
</style>
</head>
<body>

<header class="cover">
  <div class="page" style="padding:0;">
    <div class="logo-row"><img src="assets/logo_claro.png" alt="Instacredit"></div>
    <div class="eyebrow">Riesgo Regional — Instacredit</div>
    <h1>Coreografías Operativas</h1>
    <p>Cada Gerente de País documenta aquí sus Coreografías por KPI.</p>
  </div>
  <img class="prestamito" src="assets/prestamito_experto.png" alt="Prestamito">
</header>

<div class="toolbar">
  <span class="status" id="statusText">Cargando datos de la nube…</span>
  <button class="btn btn-secondary" type="button" id="btnPrint">Imprimir / PDF</button>
  <button class="btn btn-primary" type="button" id="btnSave">Guardar cambios de este país</button>
</div>

<div class="tabs" id="tabs"></div>

<div class="page" id="tabPanels"></div>

<footer>
  <span>¡Apoyándote siempre! — Instacredit Riesgo Regional</span>
  <span>Coreografías Operativas · Julio 2026</span>
</footer>

<script>
const PAISES = [
  {code:'CR', nombre:'Costa Rica', bandera:'🇨🇷'},
  {code:'NI', nombre:'Nicaragua', bandera:'🇳🇮'},
  {code:'PA', nombre:'Panamá', bandera:'🇵🇦'},
  {code:'SV', nombre:'El Salvador', bandera:'🇸🇻'}
];

const AREAS = [
  { id:'A', nombre:'Originación y Calidad de Cartera', ejecuta:'Comercial', controla:'Riesgo',
    kpis:[
      {id:'1pd_4pd', nombre:'1PD / 2PD / 3PD / 4PD', def:'% de créditos que caen en mora en el primer, segundo, tercer y cuarto pago.'},
      {id:'coincident60', nombre:'Coincident 60 (6/9/12/16 MOB)', def:'% de cosecha en mora 60+ días según meses de madurez.'},
      {id:'coincident90', nombre:'Coincident 90 (6/9/12/16 MOB)', def:'% de cosecha en mora 90+ días según meses de madurez.'},
      {id:'castigo', nombre:'Castigo (6/9/12/16 MOB)', def:'% de cosecha castigada según meses de madurez.'}
    ]},
  { id:'B', nombre:'Ejecución Comercial de Colocación', ejecuta:'Comercial', controla:'Riesgo',
    kpis:[
      {id:'auditaje_expedientes', nombre:'Auditaje de expedientes', def:'% de expedientes sin hallazgo sobre expedientes auditados.'},
      {id:'compromisos_colocacion', nombre:'Compromisos en estrategia de colocación', def:'% de compromisos pactados en comité cumplidos en fecha.'},
      {id:'aprobados_sin_formalizar', nombre:'Créditos aprobados sin formalizar', def:'Cantidad y monto de aprobados sin formalizar, con aging en días desde aprobación.'},
      {id:'conversion_preaprobados', nombre:'Conversión de preaprobados', def:'% de colocados sobre preaprobados contactados.'},
      {id:'prospectacion', nombre:'Prospectación', def:'Prospectos nuevos vs meta; tasa prospecto → solicitud → aprobado.'},
      {id:'pilotos_segmentos', nombre:'Pilotos de nuevos segmentos', def:'Desempeño de KPI Dominio A del segmento piloto vs segmento control.'},
      {id:'aprovechamiento_monto', nombre:'% aprovechamiento de monto aprobado', def:'Monto desembolsado sobre monto aprobado.'}
    ]},
  { id:'C', nombre:'Ejecución de Cobro', ejecuta:'Cobro', controla:'Riesgo',
    kpis:[
      {id:'contactos_por_cuenta', nombre:'contactos_por_cuenta', def:'Gestiones totales sobre cuentas en mora gestionadas (excluye judicial).'},
      {id:'tasa_contacto_efectivo', nombre:'tasa_contacto_efectivo', def:'Gestiones con RPC sobre gestiones totales.'},
      {id:'contacto_bruto', nombre:'% de contacto (bruto)', def:'Cuentas contactadas (con o sin RPC) sobre cuentas asignadas a gestión.'},
      {id:'tasa_promesa_pago', nombre:'tasa_promesa_pago', def:'PTP generadas sobre cuentas con RPC.'},
      {id:'tasa_cumplimiento_ptp', nombre:'tasa_cumplimiento_ptp', def:'PTP cumplidas sobre PTP generadas.'},
      {id:'incumplimiento_promesas', nombre:'% incumplimiento de promesas', def:'1 − tasa_cumplimiento_ptp, desagregado por canal/gestor.'},
      {id:'dias_primer_contacto', nombre:'dias_primer_contacto', def:'Días de mora promedio hasta primer RPC.'},
      {id:'llamada_bienvenida', nombre:'Llamada de bienvenida', def:'Contacto proactivo al cliente nuevo en los primeros días post-desembolso, antes de la fecha de primer pago.'},
      {id:'visitas_cobertura', nombre:'Estrategia de visitas de campo — cobertura', def:'Cuentas visitadas sobre cuentas asignadas a ruta.'},
      {id:'visitas_efectividad', nombre:'Estrategia de visitas de campo — efectividad', def:'PTP o recuperación generada por visita realizada.'}
    ]}
];
// AREAS.kpis de arriba es el respaldo de fábrica; loadKpiCatalog() lo sobreescribe
// con el catálogo vivo de Supabase (que Riesgo Regional puede editar/crear/eliminar).

const SUPABASE_URL = 'https://kouwqcmletybfrkispov.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdXdxY21sZXR5YmZya2lzcG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjY1ODIsImV4cCI6MjA5ODUwMjU4Mn0.FF3P6lkxmPgD6NMHaBwwuM1Y0ZprRMdsQJjEm08DmiI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STORAGE_KEY = 'instacredit_coreografias_v1';
const UNLOCK_KEY = 'instacredit_coreografias_unlocked';
let state = {};
let unlockedCountries = new Set(JSON.parse(sessionStorage.getItem(UNLOCK_KEY) || '[]'));
const openAccordions = new Set();

function kpiTieneContenido(k){
  return !!(k.situacion || k.objetivo || k.responsable || k.puntoControl || k.fechaRevision ||
    (k.acciones||[]).some(a=> a.accion || a.responsable));
}
function proyectoTieneContenido(p){
  return !!(p.nombre || p.descripcion || p.responsable || p.fechaSeguimiento ||
    (p.acciones||[]).some(a=> a.accion || a.responsable));
}
function tieneAccionCumplida(obj){
  return (obj.acciones||[]).some(a=> a.estado === 'Cumplida');
}

function emptyKpiState(){
  return { situacion:'', objetivo:'', responsable:'', puntoControl:'', fechaRevision:'', horaRevision:'',
    acciones:[ {accion:'', responsable:'', fecha:'', estado:'Pendiente'} ] };
}

function ensureState(){
  PAISES.forEach(p=>{
    if(!state[p.code]) state[p.code] = {};
    AREAS.forEach(a=>{
      if(!state[p.code][a.id]) state[p.code][a.id] = {};
      a.kpis.forEach(k=>{
        if(!state[p.code][a.id][k.id]) state[p.code][a.id][k.id] = emptyKpiState();
      });
      if(!state[p.code][a.id].customKpis) state[p.code][a.id].customKpis = [];
    });
    if(!state[p.code].proyectosEspeciales) state[p.code].proyectosEspeciales = [];
  });
}

function emptyCustomKpi(){
  return { id: uuid(), nombre:'', definicion:'', situacion:'', objetivo:'', responsable:'', puntoControl:'', fechaRevision:'', horaRevision:'',
    acciones:[ {accion:'', responsable:'', fecha:'', estado:'Pendiente'} ] };
}

function uuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{
    const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}

function emptyProyecto(){
  return { id: uuid(), nombre:'', descripcion:'', responsable:'', estado:'Pendiente', fechaSeguimiento:'', horaSeguimiento:'',
    acciones:[ {accion:'', responsable:'', fecha:'', estado:'Pendiente'} ] };
}

function loadLocalCache(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ state = JSON.parse(raw); }catch(e){ state = {}; }
  }
  ensureState();
}

function mergeCloudRows(rows){
  rows.forEach(row=>{
    const target = state[row.pais_code] && state[row.pais_code][row.area_id] && state[row.pais_code][row.area_id][row.kpi_id];
    if(!target) return;
    target.situacion = row.situacion || '';
    target.objetivo = row.objetivo || '';
    target.responsable = row.responsable || '';
    target.puntoControl = row.punto_control || '';
    target.fechaRevision = row.fecha_revision || '';
    target.horaRevision = row.hora_revision || '';
    target.acciones = (row.acciones && row.acciones.length) ? row.acciones : [{accion:'',responsable:'',fecha:'',estado:'Pendiente'}];
  });
}

function mergeProyectosRows(rows){
  const byPais = {};
  rows.forEach(r=>{
    if(!byPais[r.pais_code]) byPais[r.pais_code] = [];
    byPais[r.pais_code].push({
      id: r.id,
      nombre: r.nombre || '',
      descripcion: r.descripcion || '',
      responsable: r.responsable || '',
      estado: r.estado || 'Pendiente',
      fechaSeguimiento: r.fecha_seguimiento || '',
      horaSeguimiento: r.hora_seguimiento || '',
      acciones: (r.acciones && r.acciones.length) ? r.acciones : [{accion:'',responsable:'',fecha:'',estado:'Pendiente'}]
    });
  });
  PAISES.forEach(p=>{
    state[p.code].proyectosEspeciales = byPais[p.code] || [];
  });
}

function mergeCustomKpisRows(rows){
  const byPaisArea = {};
  rows.forEach(r=>{
    const key = r.pais_code + '|' + r.area_id;
    if(!byPaisArea[key]) byPaisArea[key] = [];
    byPaisArea[key].push({
      id: r.id,
      nombre: r.nombre || '',
      definicion: r.definicion || '',
      situacion: r.situacion || '',
      objetivo: r.objetivo || '',
      responsable: r.responsable || '',
      puntoControl: r.punto_control || '',
      fechaRevision: r.fecha_revision || '',
      horaRevision: r.hora_revision || '',
      acciones: (r.acciones && r.acciones.length) ? r.acciones : [{accion:'',responsable:'',fecha:'',estado:'Pendiente'}]
    });
  });
  PAISES.forEach(p=>{
    AREAS.forEach(a=>{
      state[p.code][a.id].customKpis = byPaisArea[p.code + '|' + a.id] || [];
    });
  });
}

async function loadFromCloud(){
  const [{ data: coreoData, error: coreoErr }, { data: proyData, error: proyErr }, { data: customData, error: customErr }] = await Promise.all([
    sb.from('coreografias').select('*'),
    sb.from('proyectos_especiales').select('*').order('updated_at', { ascending: true }),
    sb.from('kpis_adicionales').select('*').order('orden', { ascending: true })
  ]);
  if(coreoErr || proyErr || customErr){
    document.getElementById('statusText').innerHTML = 'No se pudo conectar a la nube (mostrando copia local) — ' + (coreoErr||proyErr||customErr).message;
    return;
  }
  mergeCloudRows(coreoData || []);
  mergeProyectosRows(proyData || []);
  mergeCustomKpisRows(customData || []);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderTabs();
  const now = new Date().toLocaleString('es-CR');
  document.getElementById('statusText').innerHTML = 'Datos consolidados cargados — <b>' + now + '</b>';
}

async function saveActiveCountry(){
  const activeBtn = document.querySelector('.tab-btn.active');
  const code = activeBtn.dataset.pais;
  if(!unlockedCountries.has(code)){
    alert('Este país está bloqueado. Ingresa el PIN de ' + code + ' para poder guardar.');
    return;
  }

  // Refresca desde la nube los campos de fecha/hora ya bloqueados, para no
  // pisar un ajuste que Riesgo Regional haya hecho mientras este navegador
  // tenía un valor viejo en memoria.
  document.getElementById('statusText').innerHTML = 'Verificando fechas con la nube…';
  const [{ data: freshCoreo }, { data: freshProy }, { data: freshCustom }] = await Promise.all([
    sb.from('coreografias').select('area_id,kpi_id,fecha_revision,hora_revision').eq('pais_code', code),
    sb.from('proyectos_especiales').select('id,fecha_seguimiento,hora_seguimiento').eq('pais_code', code),
    sb.from('kpis_adicionales').select('id,fecha_revision,hora_revision').eq('pais_code', code)
  ]);
  const freshCoreoMap = {};
  (freshCoreo||[]).forEach(r=> freshCoreoMap[r.area_id+'|'+r.kpi_id] = r);
  const freshProyMap = {};
  (freshProy||[]).forEach(r=> freshProyMap[r.id] = r);
  const freshCustomMap = {};
  (freshCustom||[]).forEach(r=> freshCustomMap[r.id] = r);

  const rows = [];
  AREAS.forEach(area=>{
    area.kpis.forEach(kpi=>{
      const k = state[code][area.id][kpi.id];
      const fresh = freshCoreoMap[area.id+'|'+kpi.id];
      const usarFresh = k._locked_fechaRevision && fresh;
      rows.push({
        pais_code: code,
        area_id: area.id,
        kpi_id: kpi.id,
        situacion: k.situacion,
        objetivo: k.objetivo,
        responsable: k.responsable,
        punto_control: k.puntoControl,
        fecha_revision: usarFresh ? fresh.fecha_revision : (k.fechaRevision || null),
        hora_revision: usarFresh ? fresh.hora_revision : (k.horaRevision || null),
        acciones: k.acciones,
        updated_at: new Date().toISOString()
      });
    });
  });
  const proyectoRows = state[code].proyectosEspeciales.map((p, i)=>{
    const fresh = freshProyMap[p.id];
    const usarFresh = p._locked_fechaSeguimiento && fresh;
    return {
      id: p.id,
      pais_code: code,
      nombre: p.nombre,
      descripcion: p.descripcion,
      responsable: p.responsable,
      estado: p.estado,
      fecha_seguimiento: usarFresh ? fresh.fecha_seguimiento : (p.fechaSeguimiento || null),
      hora_seguimiento: usarFresh ? fresh.hora_seguimiento : (p.horaSeguimiento || null),
      acciones: p.acciones,
      orden: i,
      updated_at: new Date().toISOString()
    };
  });

  const customKpiRows = [];
  AREAS.forEach(area=>{
    state[code][area.id].customKpis.forEach((c, i)=>{
      const fresh = freshCustomMap[c.id];
      const usarFresh = c._locked_fechaRevision && fresh;
      customKpiRows.push({
        id: c.id,
        pais_code: code,
        area_id: area.id,
        nombre: c.nombre,
        definicion: c.definicion,
        situacion: c.situacion,
        objetivo: c.objetivo,
        responsable: c.responsable,
        punto_control: c.puntoControl,
        fecha_revision: usarFresh ? fresh.fecha_revision : (c.fechaRevision || null),
        hora_revision: usarFresh ? fresh.hora_revision : (c.horaRevision || null),
        acciones: c.acciones,
        orden: i,
        updated_at: new Date().toISOString()
      });
    });
  });

  document.getElementById('statusText').innerHTML = 'Guardando ' + code + '…';
  const { error } = await sb.from('coreografias').upsert(rows, { onConflict: 'pais_code,area_id,kpi_id' });
  const { error: delErr } = await sb.from('proyectos_especiales').delete().eq('pais_code', code);
  let proyErr = null;
  if(!delErr && proyectoRows.length){
    const res = await sb.from('proyectos_especiales').insert(proyectoRows);
    proyErr = res.error;
  }
  const { error: delCustomErr } = await sb.from('kpis_adicionales').delete().eq('pais_code', code);
  let customErr = null;
  if(!delCustomErr && customKpiRows.length){
    const res = await sb.from('kpis_adicionales').insert(customKpiRows);
    customErr = res.error;
  }
  const now = new Date().toLocaleString('es-CR');
  if(error || delErr || proyErr || delCustomErr || customErr){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    document.getElementById('statusText').innerHTML = 'Error al guardar ' + code + ': ' + (error||delErr||proyErr||delCustomErr||customErr).message;
  } else {
    // Refleja en pantalla, solo para este país, cualquier fecha/hora tomada fresca de la nube
    rows.forEach(r=>{
      const k = state[code][r.area_id][r.kpi_id];
      k.fechaRevision = r.fecha_revision || '';
      k.horaRevision = r.hora_revision || '';
    });
    state[code].proyectosEspeciales = proyectoRows.map(r=> ({
      id: r.id, nombre: r.nombre, descripcion: r.descripcion, responsable: r.responsable, estado: r.estado,
      fechaSeguimiento: r.fecha_seguimiento || '', horaSeguimiento: r.hora_seguimiento || '', acciones: r.acciones
    }));
    AREAS.forEach(area=>{
      state[code][area.id].customKpis = customKpiRows
        .filter(r=> r.area_id === area.id)
        .map(r=> ({
          id: r.id, nombre: r.nombre, definicion: r.definicion, situacion: r.situacion, objetivo: r.objetivo,
          responsable: r.responsable, puntoControl: r.punto_control,
          fechaRevision: r.fecha_revision || '', horaRevision: r.hora_revision || '', acciones: r.acciones
        }));
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    renderTabs();
    selectTab(code);
    document.getElementById('statusText').innerHTML = 'Guardado en la nube (' + code + ') — <b>' + now + '</b>';
  }
}

async function attemptUnlock(code, pin, panelEl){
  const { data, error } = await sb.rpc('verificar_pin', { p_code: code, p_pin: pin });
  if(error || data !== true){
    alert('PIN incorrecto para ' + code + '.');
    return;
  }
  unlockedCountries.add(code);
  sessionStorage.setItem(UNLOCK_KEY, JSON.stringify([...unlockedCountries]));
  renderTabs();
  selectTab(code);
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('tabPanels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  PAISES.forEach((p, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0 ? ' active' : '');
    btn.textContent = p.bandera + ' ' + p.nombre;
    btn.dataset.pais = p.code;
    btn.addEventListener('click', ()=> selectTab(p.code));
    tabsEl.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx===0 ? ' active' : '');
    panel.id = 'panel-' + p.code;
    panel.appendChild(renderPais(p.code));

  tabsEl.appendChild(dashBtn);

  dashPanel.className = 'tab-panel';
  dashPanel.id = 'panel-DASHBOARD';
  dashPanel.appendChild(renderDashboardPublico());

  const regionalBtn = document.createElement('button');
  regionalBtn.className = 'tab-btn tab-btn-regional';
  regionalBtn.textContent = '🔒 Riesgo Regional';
  regionalBtn.dataset.pais = 'REGIONAL';
  regionalBtn.addEventListener('click', ()=> selectTab('REGIONAL'));
  tabsEl.appendChild(regionalBtn);

  const regionalPanel = document.createElement('div');
  regionalPanel.className = 'tab-panel';
  regionalPanel.id = 'panel-REGIONAL';
  regionalPanel.appendChild(renderRegional());
  panelsEl.appendChild(regionalPanel);

  const activePanel = panelsEl.querySelector('.tab-panel.active');
  if(activePanel) activePanel.querySelectorAll('textarea').forEach(autoGrow);
  if(window.twemoji) twemoji.parse(tabsEl, { folder:'svg', ext:'.svg' });

function selectTab(code){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.pais===code));
  document.querySelectorAll('.tab-panel').forEach(p=> p.classList.toggle('active', p.id==='panel-'+code));
  const activePanel = document.getElementById('panel-' + code);
  if(activePanel) activePanel.querySelectorAll('textarea').forEach(autoGrow);
}

async function loadFechasReunion(listWrap){
  const [{ data: coreoData }, { data: proyData }, { data: customData }] = await Promise.all([
    sb.from('coreografias').select('*'),
    sb.from('proyectos_especiales').select('*'),
    sb.from('kpis_adicionales').select('*')
  ]);
  const items = [];
  (coreoData||[]).forEach(r=>{
    if(!r.fecha_revision) return;
    const kpiDef = AREAS.flatMap(a=>a.kpis).find(k=>k.id===r.kpi_id);
    items.push({ tabla:'coreografias', id:r.id, pais:r.pais_code, origen:(kpiDef?kpiDef.nombre:r.kpi_id), fecha:r.fecha_revision, hora:r.hora_revision||'', campoFecha:'fecha_revision', campoHora:'hora_revision' });
  });
  (customData||[]).forEach(r=>{
    if(!r.fecha_revision) return;
    items.push({ tabla:'kpis_adicionales', id:r.id, pais:r.pais_code, origen:(r.nombre||'KPI adicional'), fecha:r.fecha_revision, hora:r.hora_revision||'', campoFecha:'fecha_revision', campoHora:'hora_revision' });
  });
  (proyData||[]).forEach(r=>{
    if(!r.fecha_seguimiento) return;
    items.push({ tabla:'proyectos_especiales', id:r.id, pais:r.pais_code, origen:(r.nombre||'Proyecto especial'), fecha:r.fecha_seguimiento, hora:r.hora_seguimiento||'', campoFecha:'fecha_seguimiento', campoHora:'hora_seguimiento' });
  });
  items.sort((a,b)=> (a.fecha+(a.hora||'')).localeCompare(b.fecha+(b.hora||'')));

  if(items.length === 0){
    listWrap.innerHTML = '<div class="sin-proyectos">No hay fechas de reunión definidas todavía.</div>';
    return;
  }
  listWrap.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'coreo';
  table.innerHTML = '<tr><th style="width:11%;">País</th><th style="width:29%;">Origen</th><th style="width:18%;">Fecha</th><th style="width:13%;">Hora</th><th style="width:29%;">&nbsp;</th></tr>';
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);

  items.forEach(item=>{
    const paisNombre = (PAISES.find(p=>p.code===item.pais) || {}).nombre || item.pais;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${paisNombre}</td>
      <td>${escapeAttr(item.origen)}</td>
      <td><input type="date" value="${escapeAttr(item.fecha)}"></td>
      <td><input type="time" value="${escapeAttr(item.hora)}"></td>
      <td style="white-space:nowrap;">
        <button type="button" class="btn-eliminar-proyecto" style="border-color:var(--verde);color:var(--verde);margin-right:6px;">Guardar</button>
        <button type="button" class="btn-eliminar-proyecto">Limpiar</button>
      </td>
    `;
    const [fechaEl, horaEl] = tr.querySelectorAll('input');
    const [btnGuardar, btnLimpiar] = tr.querySelectorAll('.btn-eliminar-proyecto');
    btnGuardar.addEventListener('click', async ()=>{
      const { error } = await sb.from(item.tabla).update({
        [item.campoFecha]: fechaEl.value || null,
        [item.campoHora]: horaEl.value || null
      }).eq('id', item.id);
      if(error){ alert('Error: ' + error.message); return; }
      alert('Fecha/hora actualizada. El calendario se sincroniza automáticamente en la próxima corrida diaria.');
      loadFechasReunion(listWrap);
    });
    btnLimpiar.addEventListener('click', async ()=>{
      if(!confirm('¿Limpiar esta fecha/hora de reunión (' + item.origen + ', ' + paisNombre + ')? El país podrá definir una nueva fecha desde su pestaña. El evento en el calendario se elimina en la próxima corrida diaria.')) return;
      const { error } = await sb.from(item.tabla).update({
        [item.campoFecha]: null,
        [item.campoHora]: null
      }).eq('id', item.id);
      if(error){ alert('Error: ' + error.message); return; }
      loadFechasReunion(listWrap);
    });
    tbody.appendChild(tr);
  });
  listWrap.appendChild(table);
}

async function loadGestionAcciones(listWrap){
  const [{ data: coreoData }, { data: proyData }, { data: customData }] = await Promise.all([
    sb.from('coreografias').select('*'),
    sb.from('proyectos_especiales').select('*'),
    sb.from('kpis_adicionales').select('*')
  ]);
  const items = [];
  function pushAcciones(rows, tabla, origenFn){
    (rows||[]).forEach(r=>{
      (r.acciones||[]).forEach((accion, idx)=>{
        if(!accion.accion && !accion.responsable) return;
        items.push({ tabla, id:r.id, idx, pais:r.pais_code, origen: origenFn(r), acciones: r.acciones });
      });
    });
  }
  pushAcciones(coreoData, 'coreografias', r=>{ const k=AREAS.flatMap(a=>a.kpis).find(k=>k.id===r.kpi_id); return k?k.nombre:r.kpi_id; });
  pushAcciones(customData, 'kpis_adicionales', r=> r.nombre || 'KPI adicional');
  pushAcciones(proyData, 'proyectos_especiales', r=> r.nombre || 'Proyecto especial');

  if(items.length === 0){
    listWrap.innerHTML = '<div class="sin-proyectos">No hay acciones registradas todavía.</div>';
    return;
  }
  listWrap.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'coreo';
  table.innerHTML = '<tr><th style="width:10%;">País</th><th style="width:20%;">Origen</th><th style="width:22%;">Acción</th><th style="width:13%;">Responsable</th><th style="width:11%;">Fecha</th><th style="width:10%;">Estado</th><th style="width:14%;">&nbsp;</th></tr>';
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);

  items.forEach(item=>{
    const accion = item.acciones[item.idx];
    const paisNombre = (PAISES.find(p=>p.code===item.pais) || {}).nombre || item.pais;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${paisNombre}</td>
      <td>${escapeAttr(item.origen)}</td>
      <td>${escapeAttr(accion.accion)}</td>
      <td>${escapeAttr(accion.responsable)}</td>
      <td>${accion.fecha || '—'}</td>
      <td>${escapeAttr(accion.estado)}</td>
      <td style="white-space:nowrap;">
        <button type="button" class="btn-eliminar-proyecto" style="border-color:var(--verde);color:var(--verde);margin-right:6px;">Cumplida</button>
        <button type="button" class="btn-eliminar-proyecto">Eliminar</button>
      </td>
    `;
    const [btnCumplida, btnEliminar] = tr.querySelectorAll('button');
    btnCumplida.addEventListener('click', async ()=>{
      item.acciones[item.idx].estado = 'Cumplida';
      const { error } = await sb.from(item.tabla).update({ acciones: item.acciones }).eq('id', item.id);
      if(error){ alert('Error: ' + error.message); return; }
      loadGestionAcciones(listWrap);
    });
    btnEliminar.addEventListener('click', async ()=>{
      if(!confirm('¿Eliminar esta acción de forma permanente?')) return;
      item.acciones.splice(item.idx, 1);
      const { error } = await sb.from(item.tabla).update({ acciones: item.acciones }).eq('id', item.id);
      if(error){ alert('Error: ' + error.message); return; }
      loadGestionAcciones(listWrap);
    });
    tbody.appendChild(tr);
  });
  listWrap.appendChild(table);
}

function slugKpiId(nombre){
  const base = (nombre||'kpi').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'kpi';
  return base + '_' + Math.random().toString(36).slice(2,6);
}

async function loadCatalogoMantenimiento(catalogoWrap){
  const { data, error } = await sb.from('kpis_catalogo').select('*').eq('activo', true).order('area_id').order('orden');
  if(error){
    catalogoWrap.innerHTML = '<div class="sin-proyectos">Error al cargar el catálogo: ' + error.message + '</div>';
    return;
  }
  catalogoWrap.innerHTML = '';

  AREAS.forEach(area=>{
    const areaWrap = document.createElement('div');
    areaWrap.style.marginBottom = '18px';
    const areaTitulo = document.createElement('div');
    areaTitulo.style.cssText = 'padding:10px 20px;background:#F0F3F7;font-weight:700;color:var(--azul);font-size:13px;';
    areaTitulo.textContent = area.nombre + ' (Dominio ' + area.id + ')';
    areaWrap.appendChild(areaTitulo);

    const kpisDeEstaArea = (data||[]).filter(r=> r.area_id === area.id);
    kpisDeEstaArea.forEach(row=>{
      const card = document.createElement('div');
      card.style.cssText = 'background:#fff;border:1px solid var(--gris-borde);border-top:none;padding:12px 20px;';
      card.innerHTML = `
        <div class="field-grid" style="padding:0 0 10px 0;">
          <div class="field">
            <label>Nombre del KPI</label>
            <input type="text" class="edit-nombre" value="${escapeAttr(row.nombre)}">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label>Definición</label>
            <textarea class="edit-def">${escapeAttr(row.definicion)}</textarea>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn-eliminar-proyecto" style="border-color:var(--verde);color:var(--verde);">Guardar</button>
          <button type="button" class="btn-eliminar-proyecto">Eliminar del catálogo</button>
        </div>
      `;
      card.querySelectorAll('textarea').forEach(wireAutoGrow);
      const [btnGuardar, btnEliminar] = card.querySelectorAll('.btn-eliminar-proyecto');
      btnGuardar.addEventListener('click', async ()=>{
        const nombre = card.querySelector('.edit-nombre').value.trim();
        const definicion = card.querySelector('.edit-def').value.trim();
        if(!nombre){ alert('El nombre no puede estar vacío.'); return; }
        const { error: err } = await sb.from('kpis_catalogo').update({ nombre, definicion, updated_at: new Date().toISOString() }).eq('id', row.id);
        if(err){ alert('Error: ' + err.message); return; }
        await loadKpiCatalog();
        renderTabs();
        selectTab('REGIONAL');
      });
      btnEliminar.addEventListener('click', async ()=>{
        if(!confirm('¿Quitar "' + row.nombre + '" del catálogo de los 4 países? La información que los gerentes ya hayan registrado en este KPI NO se borra, solo deja de ser visible.')) return;
        const { error: err } = await sb.from('kpis_catalogo').update({ activo: false }).eq('id', row.id);
        if(err){ alert('Error: ' + err.message); return; }
        await loadKpiCatalog();
        renderTabs();
        selectTab('REGIONAL');
      });
      areaWrap.appendChild(card);
    });

    const addCard = document.createElement('div');
    addCard.style.cssText = 'background:#F0F7EE;border:1px dashed var(--verde);border-top:none;padding:12px 20px;';
    addCard.innerHTML = `
      <div class="field-grid" style="padding:0 0 10px 0;">
        <div class="field">
          <label>Nombre del nuevo KPI</label>
          <input type="text" class="nuevo-nombre" placeholder="Nombre del KPI">
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>Definición</label>
          <textarea class="nuevo-def" placeholder="Qué mide este KPI"></textarea>
        </div>
      </div>
      <button type="button" class="add-proyecto-btn" style="margin:0;">+ Agregar KPI a este dominio</button>
    `;
    addCard.querySelectorAll('textarea').forEach(wireAutoGrow);
    addCard.querySelector('button').addEventListener('click', async ()=>{
      const nombre = addCard.querySelector('.nuevo-nombre').value.trim();
      const definicion = addCard.querySelector('.nuevo-def').value.trim();
      if(!nombre){ alert('Ponle un nombre al nuevo KPI.'); return; }
      const maxOrden = kpisDeEstaArea.reduce((m,r)=> Math.max(m, r.orden||0), 0);
      const { error: err } = await sb.from('kpis_catalogo').insert([{
        area_id: area.id, kpi_id: slugKpiId(nombre), nombre, definicion, orden: maxOrden + 1, activo: true
      }]);
      if(err){ alert('Error: ' + err.message); return; }
      await loadKpiCatalog();
      renderTabs();
      selectTab('REGIONAL');
    });
    areaWrap.appendChild(addCard);

    catalogoWrap.appendChild(areaWrap);
  });
}

const CHART_COLORS = { Pendiente:'#677C98', 'En curso':'#4C9C2E', Cumplida:'#002554', Vencida:'#EE212E' };

function renderDashboardPublico(){
  const wrap = document.createElement('div');
  wrap.style.paddingTop = '20px';

  const headerBlock = document.createElement('div');
  headerBlock.className = 'area-block proyecto-area';
  headerBlock.innerHTML = `
    <div class="area-header">
      <h2>Dashboard de avance</h2>
      <span>Visible para todos</span>
    </div>
    <div class="area-owner"><strong>Qué es:</strong> avance de las acciones registradas, agrupado por dominio y por KPI. Usa los filtros para ver el consolidado regional o el detalle de un país.</div>
  `;
  wrap.appendChild(headerBlock);

  const filtroBar = document.createElement('div');
  filtroBar.className = 'filtro-bar';
  const chartsWrap = document.createElement('div');
  chartsWrap.id = 'dashboard-publico-charts';

  const opciones = [{ code:'ALL', nombre:'Consolidado', bandera:'🌎' }, ...PAISES];
  opciones.forEach((o, idx)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filtro-btn' + (idx===0 ? ' active' : '');
    btn.textContent = o.bandera + ' ' + o.nombre;
    btn.addEventListener('click', ()=>{
      filtroBar.querySelectorAll('.filtro-btn').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      renderDashboardCharts(chartsWrap, o.code);
    });
    filtroBar.appendChild(btn);
  });
  wrap.appendChild(filtroBar);
  wrap.appendChild(chartsWrap);
  renderDashboardCharts(chartsWrap, 'ALL');
  if(window.twemoji) twemoji.parse(filtroBar, { folder:'svg', ext:'.svg' });

  return wrap;
}

async function renderDashboardCharts(dashWrap, paisFiltro){
  dashWrap.innerHTML = '<div class="sin-proyectos">Cargando dashboard…</div>';
  const [{ data: coreoData }, { data: proyData }, { data: customData }] = await Promise.all([
    sb.from('coreografias').select('*'),
    sb.from('proyectos_especiales').select('*'),
    sb.from('kpis_adicionales').select('*')
  ]);

  const todas = [];
  function collect(rows, dominioFn, paisFn, kpiFn){
    (rows||[]).forEach(r=>{
      (r.acciones||[]).forEach(a=>{
        if(!a.accion && !a.responsable) return;
        todas.push({ dominio: dominioFn(r), pais: paisFn(r), kpi: kpiFn(r), estado: a.estado || 'Pendiente' });
      });
    });
  }
  const AREA_NOMBRE = { A:'Dominio A — Originación', B:'Dominio B — Comercial', C:'Dominio C — Cobro' };
  collect(coreoData, r=> AREA_NOMBRE[r.area_id] || r.area_id, r=> r.pais_code, r=>{
    const k = AREAS.flatMap(a=>a.kpis).find(k=>k.id===r.kpi_id); return k ? k.nombre : r.kpi_id;
  });
  collect(customData, r=> (AREA_NOMBRE[r.area_id] || r.area_id) + ' (adicional)', r=> r.pais_code, r=> r.nombre || 'KPI adicional');
  collect(proyData, ()=> 'Proyectos especiales', r=> r.pais_code, r=> r.nombre || 'Proyecto especial');

  const acciones = (!paisFiltro || paisFiltro === 'ALL') ? todas : todas.filter(a=> a.pais === paisFiltro);

  if(acciones.length === 0){
    dashWrap.innerHTML = '<div class="sin-proyectos">No hay acciones registradas todavía para graficar' + (paisFiltro && paisFiltro!=='ALL' ? ' en este país' : '') + '.</div>';
    return;
  }

  const total = acciones.length;
  const cumplidas = acciones.filter(a=> a.estado==='Cumplida').length;
  const vencidas = acciones.filter(a=> a.estado==='Vencida').length;
  const enCurso = acciones.filter(a=> a.estado==='En curso').length;
  const avancePct = Math.round((cumplidas/total)*100);

  dashWrap.innerHTML = `
    <div class="dashboard-kpis">
      <div class="kpi-stat"><div class="valor">${total}</div><div class="etiqueta">Acciones totales</div></div>
      <div class="kpi-stat"><div class="valor" style="color:var(--verde);">${avancePct}%</div><div class="etiqueta">Avance (cumplidas)</div></div>
      <div class="kpi-stat"><div class="valor" style="color:var(--azul-claro);">${enCurso}</div><div class="etiqueta">En curso</div></div>
      <div class="kpi-stat"><div class="valor" style="color:var(--rojo);">${vencidas}</div><div class="etiqueta">Vencidas</div></div>
    </div>
    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h4>Estado general</h4>
        <div class="subtitulo">Distribución de todas las acciones</div>
        <canvas id="chart-estado-general"></canvas>
      </div>
      <div class="dashboard-card">
        <h4>Avance por país</h4>
        <div class="subtitulo">% de acciones cumplidas por país</div>
        <canvas id="chart-por-pais"></canvas>
      </div>
      <div class="dashboard-card full">
        <h4>Avance por dominio</h4>
        <div class="subtitulo">Cantidad de acciones por estado, en cada dominio y en proyectos especiales</div>
        <canvas id="chart-por-dominio"></canvas>
      </div>
      <div class="dashboard-card full">
        <h4>Avance por KPI</h4>
        <div class="subtitulo">Los 10 KPI/proyectos con más acciones registradas</div>
        <canvas id="chart-por-kpi"></canvas>
      </div>
    </div>
  `;

  const ESTADOS = ['Pendiente','En curso','Cumplida','Vencida'];

  // Estado general (dona)
  const conteoGeneral = ESTADOS.map(e=> acciones.filter(a=>a.estado===e).length);
  new Chart(document.getElementById('chart-estado-general'), {
    type: 'doughnut',
    data: { labels: ESTADOS, datasets: [{ data: conteoGeneral, backgroundColor: ESTADOS.map(e=>CHART_COLORS[e]) }] },
    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } }
  });

  // Avance por país (siempre consolidado, aunque el resto del dashboard esté filtrado a un país, para dar contexto de comparación)
  const paisesConDatos = PAISES.map(p=>{
    const deEstePais = todas.filter(a=> a.pais === p.code);
    const pct = deEstePais.length ? Math.round((deEstePais.filter(a=>a.estado==='Cumplida').length / deEstePais.length) * 100) : 0;
    return { nombre: p.nombre, pct, esFiltro: p.code === paisFiltro };
  });
  new Chart(document.getElementById('chart-por-pais'), {
    type: 'bar',
    data: { labels: paisesConDatos.map(p=>p.nombre), datasets: [{ label:'% cumplidas', data: paisesConDatos.map(p=>p.pct), backgroundColor: paisesConDatos.map(p=> p.esFiltro ? '#002554' : '#4C9C2E'), borderRadius: 4 }] },
    options: { scales: { y: { beginAtZero:true, max:100, ticks:{ callback:v=>v+'%' } } }, plugins: { legend: { display:false } } }
  });

  // Avance por dominio (barras apiladas)
  const dominios = [...new Set(acciones.map(a=>a.dominio))].sort();
  new Chart(document.getElementById('chart-por-dominio'), {
    type: 'bar',
    data: {
      labels: dominios,
      datasets: ESTADOS.map(e=> ({
        label: e,
        data: dominios.map(d=> acciones.filter(a=> a.dominio===d && a.estado===e).length),
        backgroundColor: CHART_COLORS[e]
      }))
    },
    options: { scales: { x: { stacked:true }, y: { stacked:true, beginAtZero:true, ticks:{ precision:0 } } }, plugins: { legend: { position:'bottom', labels:{ boxWidth:12, font:{ size:11 } } } } }
  });

  // Avance por KPI (top 10 por volumen de acciones)
  const porKpi = {};
  acciones.forEach(a=>{
    if(!porKpi[a.kpi]) porKpi[a.kpi] = { total:0, cumplidas:0 };
    porKpi[a.kpi].total++;
    if(a.estado==='Cumplida') porKpi[a.kpi].cumplidas++;
  });
  const topKpis = Object.entries(porKpi).sort((a,b)=> b[1].total - a[1].total).slice(0,10);
  new Chart(document.getElementById('chart-por-kpi'), {
    type: 'bar',
    data: {
      labels: topKpis.map(([nombre])=> nombre),
      datasets: [
        { label:'Cumplidas', data: topKpis.map(([,v])=> v.cumplidas), backgroundColor:'#4C9C2E', borderRadius:4 },
        { label:'Pendientes/otras', data: topKpis.map(([,v])=> v.total - v.cumplidas), backgroundColor:'#D2D2D2', borderRadius:4 }
      ]
    },
    options: { indexAxis:'y', scales: { x: { stacked:true, beginAtZero:true, ticks:{ precision:0 } }, y: { stacked:true, ticks:{ font:{ size:10.5 } } } }, plugins: { legend: { position:'bottom', labels:{ boxWidth:12, font:{ size:11 } } } } }
  });
}

async function loadBitacora(listWrap){
  const { data, error } = await sb.from('kpis_adicionales_log').select('*').order('deleted_at', { ascending: false });
  if(error){
    listWrap.innerHTML = '<div class="sin-proyectos">Error al cargar la bitácora: ' + error.message + '</div>';
    return;
  }
  if(!data || data.length === 0){
    listWrap.innerHTML = '<div class="sin-proyectos">Sin KPI eliminados registrados todavía.</div>';
    return;
  }
  listWrap.innerHTML = '';

  const clearAllBtn = document.createElement('button');
  clearAllBtn.type = 'button';
  clearAllBtn.className = 'add-proyecto-btn';
  clearAllBtn.style.background = 'var(--rojo)';
  clearAllBtn.textContent = 'Vaciar toda la bitácora (' + data.length + ')';
  clearAllBtn.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar los ' + data.length + ' registros de la bitácora? Esta acción no se puede deshacer.')) return;
    const { error: delAllErr } = await sb.from('kpis_adicionales_log').delete().not('id', 'is', null);
    if(delAllErr){ alert('Error: ' + delAllErr.message); return; }
    loadBitacora(listWrap);
  });
  listWrap.appendChild(clearAllBtn);

  data.forEach(row=>{
    const paisNombre = (PAISES.find(p=>p.code===row.pais_code) || {}).nombre || row.pais_code;
    const areaNombre = (AREAS.find(a=>a.id===row.area_id) || {}).nombre || row.area_id;
    const card = document.createElement('div');
    card.className = 'proyecto-card';

    const headerRow = document.createElement('div');
    headerRow.className = 'proyecto-card-header';
    headerRow.innerHTML = `
      <span style="font-weight:800;color:var(--azul);">${escapeAttr(row.nombre || '(sin nombre)')} — ${paisNombre} · ${areaNombre}</span>
      <button type="button" class="btn-eliminar-proyecto">Eliminar registro</button>
    `;
    headerRow.querySelector('.btn-eliminar-proyecto').addEventListener('click', async ()=>{
      const { error: delErr } = await sb.from('kpis_adicionales_log').delete().eq('id', row.id);
      if(delErr){ alert('Error: ' + delErr.message); return; }
      loadBitacora(listWrap);
    });
    card.appendChild(headerRow);

    const info = document.createElement('div');
    info.style.padding = '12px 20px';
    info.style.fontSize = '13px';
    const accionesTexto = (row.acciones || []).map((a,i)=> (i+1) + '. ' + (a.accion||'(sin descripción)') + ' — ' + (a.responsable||'—') + ' — ' + (a.fecha||'sin fecha') + ' — ' + (a.estado||'')).join('<br>');
    info.innerHTML = `
      <div style="margin-bottom:6px;"><strong>Eliminado:</strong> ${new Date(row.deleted_at).toLocaleString('es-CR')}</div>
      <div style="margin-bottom:6px;"><strong>Definición:</strong> ${escapeAttr(row.definicion) || '—'}</div>
      <div style="margin-bottom:6px;"><strong>Situación (último dato):</strong> ${escapeAttr(row.situacion) || '—'}</div>
      <div style="margin-bottom:6px;"><strong>Objetivo:</strong> ${escapeAttr(row.objetivo) || '—'}</div>
      <div style="margin-bottom:6px;"><strong>Responsable:</strong> ${escapeAttr(row.responsable) || '—'}</div>
      <div style="margin-bottom:6px;"><strong>Punto de control:</strong> ${escapeAttr(row.punto_control) || '—'}</div>
      <div style="margin-bottom:6px;"><strong>Fecha de revisión:</strong> ${row.fecha_revision || '—'}</div>
      <div><strong>Acciones registradas:</strong><br>${accionesTexto || '—'}</div>
    `;
    card.appendChild(info);
    listWrap.appendChild(card);
  });
}

function renderPais(paisCode){
  const wrap = document.createElement('div');
  const isUnlocked = unlockedCountries.has(paisCode);

  const pinBar = document.createElement('div');
  pinBar.className = 'pin-bar' + (isUnlocked ? ' unlocked' : '');
  if(isUnlocked){
    pinBar.innerHTML = `<span>🔓 ${paisCode} desbloqueado en esta sesión — los campos son editables.</span>`;
  } else {
    pinBar.innerHTML = `
      <span>🔒 Ingresa el PIN de ${paisCode} para editar (solo lectura mientras tanto):</span>
      <input type="password" placeholder="PIN" maxlength="6">
      <button type="button">Desbloquear</button>
    `;
    pinBar.querySelector('button').addEventListener('click', ()=>{
      const pin = pinBar.querySelector('input').value.trim();
      if(pin) attemptUnlock(paisCode, pin);
    });
    pinBar.querySelector('input').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') pinBar.querySelector('button').click();
    });
  }
  wrap.appendChild(pinBar);

  AREAS.forEach(area=>{
    const block = document.createElement('div');
    block.className = 'area-block';

    block.innerHTML = `
      <div class="area-header">
        <h2>${area.nombre}</h2>
        <span>Dominio ${area.id}</span>
      </div>
      <div class="area-owner"><strong>Ejecuta:</strong> ${area.ejecuta} &nbsp;|&nbsp; <strong>Controla:</strong> ${area.controla}</div>
    `;

    const kpiBlock = document.createElement('div');
    kpiBlock.className = 'kpi-block' + (isUnlocked ? '' : ' locked');

    area.kpis.forEach(kpi=>{
      const kpiState = state[paisCode][area.id][kpi.id];
      const accKey = paisCode + '|' + area.id + '|' + kpi.id;
      const isOpen = openAccordions.has(accKey);

      const itemWrap = document.createElement('div');
      itemWrap.className = 'kpi-accordion-item' + (isOpen ? ' open' : '');

      const header = document.createElement('div');
      header.className = 'kpi-row-header';
      header.innerHTML = `
        <span class="titulo-wrap">${kpiTieneContenido(kpiState) ? '<span class="badge-tiene-datos' + (tieneAccionCumplida(kpiState) ? ' completada' : '') + '" title="' + (tieneAccionCumplida(kpiState) ? 'Tiene al menos una acción cumplida' : 'Tiene información registrada') + '"></span>' : ''}<span>${escapeAttr(kpi.nombre)}</span></span>
        <span class="chevron">▶</span>
      `;
      header.addEventListener('click', ()=>{
        itemWrap.classList.toggle('open');
        if(itemWrap.classList.contains('open')){
          openAccordions.add(accKey);
          body.querySelectorAll('textarea').forEach(autoGrow);
        } else {
          openAccordions.delete(accKey);
        }
      });
      itemWrap.appendChild(header);

      const body = document.createElement('div');
      body.className = 'kpi-accordion-body';
      itemWrap.appendChild(body);
      kpiBlock.appendChild(itemWrap);

      const def = document.createElement('div');
      def.className = 'kpi-def';
      def.textContent = kpi.def;
      body.appendChild(def);

      const fieldGrid = document.createElement('div');
      fieldGrid.className = 'field-grid';
      fieldGrid.innerHTML = `
        <div class="field">
          <label>Situación actual (valor vs meta)</label>
          <textarea data-field="situacion">${kpiState.situacion}</textarea>
        </div>
        <div class="field">
          <label>Objetivo de la coreografía</label>
          <textarea data-field="objetivo">${kpiState.objetivo}</textarea>
        </div>
        <div class="field">
          <label>Responsable</label>
          <input type="text" data-field="responsable" value="${escapeAttr(kpiState.responsable)}">
        </div>
      `;
      fieldGrid.querySelectorAll('[data-field]').forEach(el=>{
        el.addEventListener('input', ()=>{
          kpiState[el.dataset.field] = el.value;
          markDirty();
        });
      });
      fieldGrid.querySelectorAll('textarea').forEach(wireAutoGrow);
      body.appendChild(fieldGrid);

      const table = document.createElement('table');
      table.className = 'coreo';
      table.innerHTML = `
        <tr><th style="width:5%;">#</th><th style="width:36%;">Acción</th><th style="width:20%;">Responsable</th><th style="width:16%;">Fecha compromiso</th><th style="width:16%;">Estado</th><th class="row-actions">&nbsp;</th></tr>
      `;
      const tbody = document.createElement('tbody');
      table.appendChild(tbody);

      function renderAcciones(){
        tbody.innerHTML = '';
        kpiState.acciones.forEach((accion, i)=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${i+1}</td>
            <td><textarea data-f="accion" rows="1">${escapeAttr(accion.accion)}</textarea></td>
            <td><textarea data-f="responsable" rows="1">${escapeAttr(accion.responsable)}</textarea></td>
            <td><input type="date" data-f="fecha" min="${HOY}" value="${escapeAttr(accion.fecha)}"></td>
            <td>
              <select data-f="estado" class="estado">
                <option value="Pendiente" ${accion.estado==='Pendiente'?'selected':''}>Pendiente</option>
                <option value="En curso" ${accion.estado==='En curso'?'selected':''}>En curso</option>
                <option value="Cumplida" ${accion.estado==='Cumplida'?'selected':''}>Cumplida</option>
                <option value="Vencida" ${accion.estado==='Vencida'?'selected':''}>Vencida</option>
              </select>
            </td>
            <td class="row-actions">${regionalUnlocked ? '<button type="button" class="btn-regional-check" title="Marcar cumplida (Riesgo Regional)"' + (accion.estado==='Cumplida'?' disabled':'') + '>' + (accion.estado==='Cumplida'?'✓ Cumplida':'✓') + '</button>' : ''}<button type="button" title="Eliminar fila" data-remove="${i}">×</button></td>
          `;
          if(regionalUnlocked){
            tr.querySelector('.btn-regional-check').addEventListener('click', (e)=>{
              regionalMarcarCumplida('coreografias', { pais_code: paisCode, area_id: area.id, kpi_id: kpi.id }, kpiState.acciones, i, e.target);
            });
          }
          tr.querySelectorAll('[data-f]:not([data-f="fecha"])').forEach(el=>{
            const ev = el.tagName === 'SELECT' ? 'change' : 'input';
            el.addEventListener(ev, ()=>{
              accion[el.dataset.f] = el.value;
              markDirty();
            });
          });

const HOY = new Date().toISOString().slice(0,10);

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function wireAutoGrow(textareaEl){
  autoGrow(textareaEl);
  textareaEl.addEventListener('input', ()=> autoGrow(textareaEl));
}

function escapeAttr(v){
  return (v||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

async function regionalMarcarCumplida(tabla, match, acciones, idx, btn){
  if(!confirm('¿Marcar esta acción como cumplida? Riesgo Regional puede hacer esto sin necesitar el PIN del país.')) return;
  acciones[idx].estado = 'Cumplida';
  let q = sb.from(tabla).update({ acciones });
  Object.entries(match).forEach(([k,v])=>{ q = q.eq(k, v); });
  const { error } = await q;
  if(error){
    alert('Error al marcar cumplida: ' + error.message);
    acciones[idx].estado = acciones[idx].estado === 'Cumplida' ? 'Pendiente' : acciones[idx].estado;
    return;
  }
  const row = btn.closest('tr');
  const estadoSelect = row.querySelector('[data-f="estado"]');
  if(estadoSelect) estadoSelect.value = 'Cumplida';
  btn.disabled = true;
  btn.textContent = '✓ Cumplida';
}

function wireFechaHoraDefinitiva(container, obj, fechaField, horaField, label){
  const fechaInput = container.querySelector('[data-field="' + fechaField + '"]');
  const horaInput = container.querySelector('[data-field="' + horaField + '"]');
  let comprometida = !!obj[fechaField];
  obj['_locked_' + fechaField] = comprometida;
  if(comprometida){
    fechaInput.classList.add('fecha-definitiva');
    horaInput.classList.add('fecha-definitiva');
  }
  const bloquear = ()=>{
    fechaInput.value = obj[fechaField];
    horaInput.value = obj[horaField];
    alert('La ' + label + ' ya fue definida (' + obj[fechaField] + (obj[horaField] ? ' ' + obj[horaField] : '') + ') y es definitiva. Si necesitas cambiarla, comunícate con Riesgo Regional para coordinar una nueva fecha/hora.');
  };
  fechaInput.addEventListener('change', ()=>{
    if(comprometida){ bloquear(); return; }
    obj[fechaField] = fechaInput.value;
    comprometida = !!obj[fechaField];
    obj['_locked_' + fechaField] = comprometida;
    if(comprometida){
      fechaInput.classList.add('fecha-definitiva');
      horaInput.classList.add('fecha-definitiva');
    }
    markDirty();
  });
  horaInput.addEventListener('change', ()=>{
    if(comprometida){ bloquear(); return; }
    obj[horaField] = horaInput.value;
    markDirty();
  });
}

document.getElementById('btnSave').addEventListener('click', saveActiveCountry);
document.getElementById('btnPrint').addEventListener('click', ()=> window.print());

async function loadKpiCatalog(){
  const { data, error } = await sb.from('kpis_catalogo').select('*').eq('activo', true).order('area_id').order('orden');
  if(error || !data || data.length === 0) return;
  AREAS.forEach(area=>{
    const kpisDeEstaArea = data.filter(r=> r.area_id === area.id);
    if(kpisDeEstaArea.length){
      area.kpis = kpisDeEstaArea.map(r=> ({ id: r.kpi_id, nombre: r.nombre, def: r.definicion || '' }));
    }
  });
}

(async function init(){
  await loadKpiCatalog();
  loadLocalCache();
  renderTabs();
  loadFromCloud();
})();
</script>
